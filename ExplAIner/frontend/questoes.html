<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExplAIner | Questões</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pagina">
        <header class="cabecalho">
            <div class="marca">
                <span class="logo">E</span>
                <div>
                    <h1>ExplAIner</h1>
                    <p>Gerenciar questões</p>
                </div>
            </div>
            <nav class="menu-navegacao">
                <a href="index.html" class="link-navegacao">Cadastro</a>
                <a href="ler.html" class="link-navegacao">Ler</a>
                <a href="listar.html" class="link-navegacao">Listar</a>
                <a href="temas.html" class="link-navegacao">Temas</a>
                <a href="desafios.html" class="link-navegacao">Desafios</a>
                <a href="questoes.html" class="link-navegacao ativo">Questões</a>
                <a href="ranking.html" class="link-navegacao">Ranking</a>
            </nav>
        </header>

        <main class="conteudo">
            <section class="cartao">
                <div class="intro-bloco">
                    <p class="intro-kicker">Questões</p>
                    <p class="intro-text">Cadastre questões vinculadas a um tema.</p>
                </div>
                <form class="grade-formulario" id="form-questao">
                    <label class="campo campo-longo">
                        <span>Enunciado</span>
                        <input type="text" name="enunciado" placeholder="Ex.: Quanto é 2 + 2?" required>
                    </label>
                    <label class="campo">
                        <span>Alternativa correta</span>
                        <input type="text" name="alternativa_correta" placeholder="Ex.: B" maxlength="1">
                    </label>
                    <label class="campo">
                        <span>ID do tema</span>
                        <input type="number" name="id_tema" placeholder="Ex.: 1" required>
                    </label>
                    <button type="submit">Salvar questão</button>
                </form>
                <div id="mensagem-questao" class="resultado" style="display:none"></div>
                <form class="grade-formulario" id="form-questao-atualizar" style="margin-top: 1.5rem;">
                    <label class="campo">
                        <span>ID da questão</span>
                        <input type="number" id="questao-id-atualizar" placeholder="Ex.: 1" required>
                    </label>
                    <label class="campo campo-longo">
                        <span>Novo enunciado</span>
                        <input type="text" id="questao-enunciado-atualizar" placeholder="Deixe em branco para não alterar">
                    </label>
                    <label class="campo">
                        <span>Nova alternativa correta</span>
                        <input type="text" id="questao-alternativa-atualizar" placeholder="Deixe em branco para não alterar" maxlength="1">
                    </label>
                    <label class="campo">
                        <span>ID do tema</span>
                        <input type="number" id="questao-tema-atualizar" placeholder="Deixe em branco para não alterar">
                    </label>
                    <button type="submit">Atualizar questão</button>
                </form>
                <div id="mensagem-questao-atualizar" class="resultado" style="display:none"></div>
                <form class="grade-formulario" id="form-questao-deletar" style="margin-top: 1.5rem;">
                    <label class="campo">
                        <span>ID da questão</span>
                        <input type="number" id="questao-id-deletar" placeholder="Ex.: 1" required>
                    </label>
                    <button type="submit">Excluir questão</button>
                </form>
                <div id="mensagem-questao-deletar" class="resultado" style="display:none"></div>
                <div class="resultado" style="margin-top: 1rem; padding: 0; border: none; overflow-x:auto;">
                    <table style="width:100%; border-collapse:collapse; text-align:left;">
                        <thead>
                            <tr style="border-bottom: 1px solid var(--borda);">
                                <th style="padding:0.7rem">ID</th>
                                <th style="padding:0.7rem">Enunciado</th>
                                <th style="padding:0.7rem">Alternativa</th>
                                <th style="padding:0.7rem">Tema</th>
                            </tr>
                        </thead>
                        <tbody id="lista-questoes"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="questoes.js"></script>
</body>
</html>
