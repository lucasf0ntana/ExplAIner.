<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExplAIner | Ler</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="pagina">
        <header class="cabecalho">
            <div class="marca">
                <span class="logo">E</span>
                <div>
                    <h1>ExplAIner</h1>
                    <p>Consultar aluno</p>
                </div>
            </div>

            <nav class="menu-navegacao">
                <a href="index.html" class="link-navegacao">Cadastro</a>
                <a href="ler.html" class="link-navegacao ativo">Ler</a>
                <a href="listar.html" class="link-navegacao">Listar</a>
                <a href="atualizar.html" class="link-navegacao">Atualizar</a>
                <a href="deletar.html" class="link-navegacao">Deletar</a>
            </nav>
        </header>

      <main class="conteudo">
    <section class="cartao">
        <div class="titulo-cartao">
            <h2>Consultar aluno</h2>
            <p>Informe o código do aluno para visualizar as informações cadastradas.</p>
        </div>

        <form class="grade-formulario" id="form-buscar">
            <label class="campo campo-longo">
                <span>ID do aluno</span>
                <input type="number" id="buscar-id" placeholder="Ex.: 1" required>
            </label>

            <button type="submit" id="btn-buscar">Buscar</button>
        </form>

        <div class="resultado" id="resultado-busca">
            <h3 id="busca-titulo">Resultado</h3>
            <div id="busca-corpo" class="texto-ajuda">
                Digite um ID acima para ver os dados deste aluno na tela.
            </div>
        </div>
    </section>
</main>
</div>

<script src="ler.js">const API_URL = 'http://127.0.0.1:5000';

document.getElementById('form-buscar').addEventListener('submit', async (e) => {
    e.preventDefault();

    const idAluno = document.getElementById('buscar-id').value;
    const buscaTitulo = document.getElementById('busca-titulo');
    const buscaCorpo = document.getElementById('busca-corpo');

    try {
        const response = await fetch(`${API_URL}/alunos/${idAluno}`);
        const resultado = await response.json();

        if (response.ok) {
            buscaTitulo.innerText = "🔍 Aluno Encontrado";
            buscaTitulo.style.color = "#4f46e5";
            
            buscaCorpo.innerHTML = `
                <p style="margin-bottom: 0.4rem;"><strong>Nome:</strong> ${resultado.nome}</p>
                <p style="margin-bottom: 0.4rem;"><strong>E-mail:</strong> ${resultado.email}</p>
                <p style="margin-bottom: 0.4rem;"><strong>Nascimento:</strong> ${resultado.data_nascimento || 'Não informada'}</p>
                <p style="margin-bottom: 0.4rem;"><strong>Pontos:</strong> ✨ ${resultado.pontos}</p>
                <p><strong>Foguinho (Streak):</strong> 🔥 ${resultado.foguinho} dias</p>
            `;
        } else {
            buscaTitulo.innerText = "⚠️ Informação";
            buscaTitulo.style.color = "#dc2626";
            buscaCorpo.innerText = resultado.erro || "Aluno não encontrado.";
        }
    } catch (error) {
        buscaTitulo.innerText = "❌ Erro de Conexão";
        buscaTitulo.style.color = "#dc2626";
        buscaCorpo.innerText = "Não foi possível conectar ao servidor.";
        console.error(error);
    }
});</script>
</body>
</html>
