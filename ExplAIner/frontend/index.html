<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExplAIner | Cadastro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="pagina">
        <header class="cabecalho">
            <div class="marca">
                <span class="logo">E</span>
                <div>
                    <h1>ExplAIner</h1>
                    <p>Cadastro de aluno</p>
                </div>
            </div>

            <nav class="menu-navegacao">
                <a href="index.html" class="link-navegacao ativo">Cadastro</a>
                <a href="ler.html" class="link-navegacao">Ler</a>
                <a href="listar.html" class="link-navegacao">Listar</a>
                <a href="atualizar.html" class="link-navegacao">Atualizar</a>
                <a href="deletar.html" class="link-navegacao">Deletar</a>
                <a href="temas.html" class="link-navegacao">Temas</a>
                <a href="desafios.html" class="link-navegacao">Desafios</a>
                <a href="questoes.html" class="link-navegacao">Questões</a>
                <a href="ranking.html" class="link-navegacao">Ranking</a>
            </nav>
        </header>

<main class="conteudo">
    <section class="cartao">
        <div class="intro-bloco">
            <p class="intro-kicker">Cadastro</p>
            <p class="intro-text">Cadastre o aluno de forma clara e organizada para manter o sistema em ordem.</p>
        </div>
        <div class="titulo-cartao">
            <h2>Novo cadastro</h2>
            <p>Preencha os dados abaixo para incluir um novo aluno no sistema.</p>
        </div>

        <form class="grade-formulario" id="form-cadastro">
            <label class="campo">
                <span>Nome completo</span>
                <input type="text" name="nome" placeholder="Ex.: Ana Souza" required>
            </label>

            <label class="campo">
                <span>E-mail</span>
                <input type="email" name="email" placeholder="ana@email.com" required>
            </label>

            <label class="campo">
                <span>Senha</span>
                <input type="password" name="senha" placeholder="Digite uma senha" required>
            </label>

            <label class="campo">
                <span>Data de nascimento</span>
                <input type="date" name="data_nascimento" required>
            </label>

            <button type="submit" id="btn-enviar">Cadastrar</button>
        </form>

        <div id="mensagem-resposta" class="resultado" style="display: none;">
            <h3 id="resposta-titulo"></h3>
            <p id="resposta-corpo" class="texto-ajuda"></p>
        </div>
    </section>
</main>
</div>

<script src="script.js"></script>
    
</body>
</html>
