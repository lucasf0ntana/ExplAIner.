<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExplAIner | Deletar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="pagina">
        <header class="cabecalho">
            <div class="marca">
                <span class="logo">E</span>
                <div>
                    <h1>ExplAIner</h1>
                    <p>Deletar aluno</p>
                </div>
            </div>

            <nav class="menu-navegacao">
                <a href="index.html" class="link-navegacao">Cadastro</a>
                <a href="ler.html" class="link-navegacao">Ler</a>
                <a href="listar.html" class="link-navegacao">Listar</a>
                <a href="atualizar.html" class="link-navegacao">Atualizar</a>
                <a href="deletar.html" class="link-navegacao ativo">Deletar</a>
            </nav>
        </header>

        <main class="conteudo">
    <section class="cartao">
        <div class="titulo-cartao">
            <h2>Excluir aluno</h2>
            <p>Digite o ID do aluno que deseja remover do sistema.</p>
        </div>

        <form class="grade-formulario" id="form-deletar">
            <label class="campo campo-longo">
                <span>ID do aluno</span>
                <input type="number" id="deletar-id" placeholder="Ex.: 3" required>
            </label>

            <button type="submit" id="btn-deletar" style="background-color: #dc2626;">Excluir aluno</button>
        </form>

        <div class="resultado" id="mensagem-deletar">
            <h3 id="deletar-titulo">Atenção</h3>
            <p id="deletar-corpo" class="texto-ajuda">Essa ação remove o aluno do cadastro. Confirme antes de continuar.</p>
        </div>
    </section>
</main>
</div>

<script src="deletar.js">const API_URL = 'http://127.0.0.1:5000';

document.getElementById('form-deletar').addEventListener('submit', async (e) => {
    e.preventDefault();

    const idAluno = document.getElementById('deletar-id').value;
    const txtTitulo = document.getElementById('deletar-titulo');
    const txtCorpo = document.getElementById('deletar-corpo');

    const confirmacao = confirm(`Tem certeza absoluta que deseja excluir o aluno com ID ${idAluno}?`);
    if (!confirmacao) return;

    try {
        const response = await fetch(`${API_URL}/alunos/${idAluno}`, {
            method: 'DELETE'
        });

        if (response.status === 204) {
            txtTitulo.innerText = "🗑️ Aluno Removido";
            txtTitulo.style.color = "#16a34a";
            txtCorpo.innerText = `O aluno com ID ${idAluno} foi excluído permanentemente do sistema.`;
            document.getElementById('form-deletar').reset();
        } else {
            const resultado = await response.json();
            txtTitulo.innerText = "⚠️ Erro ao Excluir";
            txtTitulo.style.color = "#dc2626";
            txtCorpo.innerText = resultado.erro || "Não foi possível remover o aluno.";
        }
    } catch (error) {
        txtTitulo.innerText = "❌ Erro de Conexão";
        txtTitulo.style.color = "#dc2626";
        txtCorpo.innerText = "Erro ao estabelecer comunicação com o servidor.";
        console.error(error);
    }
});</script>

</body>
</html>
