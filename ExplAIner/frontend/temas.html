<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExplAIner | Temas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pagina">
        <header class="cabecalho">
            <div class="marca">
                <span class="logo">E</span>
                <div>
                    <h1>ExplAIner</h1>
                    <p>Gerenciar temas</p>
                </div>
            </div>
            <nav class="menu-navegacao">
                <a href="index.html" class="link-navegacao">Cadastro</a>
                <a href="ler.html" class="link-navegacao">Ler</a>
                <a href="listar.html" class="link-navegacao">Listar</a>
                <a href="temas.html" class="link-navegacao ativo">Temas</a>
                <a href="desafios.html" class="link-navegacao">Desafios</a>
                <a href="questoes.html" class="link-navegacao">Questões</a>
                <a href="ranking.html" class="link-navegacao">Ranking</a>
            </nav>
        </header>

        <main class="conteudo">
            <section class="cartao">
                <div class="intro-bloco">
                    <p class="intro-kicker">Temas</p>
                    <p class="intro-text">Cadastre e visualize os temas utilizados nas questões.</p>
                </div>
                <form class="grade-formulario" id="form-tema">
                    <label class="campo">
                        <span>Matéria</span>
                        <input type="text" name="materia" placeholder="Ex.: Matemática" required>
                    </label>
                    <label class="campo">
                        <span>Nome do tema</span>
                        <input type="text" name="nome" placeholder="Ex.: Frações" required>
                    </label>
                    <button type="submit">Salvar tema</button>
                </form>
                <div id="mensagem-tema" class="resultado" style="display:none"></div>
                <form class="grade-formulario" id="form-tema-atualizar" style="margin-top: 1.5rem;">
                    <label class="campo">
                        <span>ID do tema</span>
                        <input type="number" id="tema-id-atualizar" placeholder="Ex.: 1" required>
                    </label>
                    <label class="campo">
                        <span>Nova matéria</span>
                        <input type="text" id="tema-materia-atualizar" placeholder="Deixe em branco para não alterar">
                    </label>
                    <label class="campo">
                        <span>Novo nome</span>
                        <input type="text" id="tema-nome-atualizar" placeholder="Deixe em branco para não alterar">
                    </label>
                    <button type="submit">Atualizar tema</button>
                </form>
                <div id="mensagem-tema-atualizar" class="resultado" style="display:none"></div>
                <form class="grade-formulario" id="form-tema-deletar" style="margin-top: 1.5rem;">
                    <label class="campo">
                        <span>ID do tema</span>
                        <input type="number" id="tema-id-deletar" placeholder="Ex.: 1" required>
                    </label>
                    <button type="submit">Excluir tema</button>
                </form>
                <div id="mensagem-tema-deletar" class="resultado" style="display:none"></div>
                <div class="resultado" style="margin-top: 1rem; padding: 0; border: none; overflow-x:auto;">
                    <table style="width:100%; border-collapse:collapse; text-align:left;">
                        <thead>
                            <tr style="border-bottom: 1px solid var(--borda);">
                                <th style="padding:0.7rem">ID</th>
                                <th style="padding:0.7rem">Matéria</th>
                                <th style="padding:0.7rem">Tema</th>
                            </tr>
                        </thead>
                        <tbody id="lista-temas"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="temas.js"></script>
</body>
</html>
