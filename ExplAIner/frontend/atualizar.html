<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExplAIner | Atualizar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="pagina">
        <header class="cabecalho">
            <div class="marca">
                <span class="logo">E</span>
                <div>
                    <h1>ExplAIner</h1>
                    <p>Atualizar aluno</p>
                </div>
            </div>

            <nav class="menu-navegacao">
                <a href="index.html" class="link-navegacao">Cadastro</a>
                <a href="ler.html" class="link-navegacao">Ler</a>
                <a href="listar.html" class="link-navegacao">Listar</a>
                <a href="atualizar.html" class="link-navegacao ativo">Atualizar</a>
                <a href="deletar.html" class="link-navegacao">Deletar</a>
                <a href="temas.html" class="link-navegacao">Temas</a>
                <a href="desafios.html" class="link-navegacao">Desafios</a>
                <a href="questoes.html" class="link-navegacao">Questões</a>
                <a href="ranking.html" class="link-navegacao">Ranking</a>
            </nav>
        </header>

        <main class="conteudo">
    <section class="cartao">
        <div class="intro-bloco">
            <p class="intro-kicker">Edição</p>
            <p class="intro-text">Atualize os dados de um aluno sem perder o contexto do cadastro.</p>
        </div>
        <div class="titulo-cartao">
            <h2>Atualizar dados do aluno</h2>
            <p>Informe o ID do aluno e edite as informações desejadas.</p>
        </div>

        <form class="grade-formulario" id="form-atualizar">
            <label class="campo">
                <span>ID do aluno</span>
                <input type="number" id="atualizar-id" placeholder="Ex.: 1" required>
            </label>

            <label class="campo">
                <span>Nome completo</span>
                <input type="text" name="nome" placeholder="Novo nome">
            </label>

            <label class="campo">
                <span>E-mail</span>
                <input type="email" name="email" placeholder="novo@email.com">
            </label>

            <label class="campo">
                <span>Senha</span>
                <input type="password" name="senha" placeholder="Nova senha">
            </label>

            <label class="campo campo-longo">
                <span>Data de nascimento</span>
                <input type="date" name="data_nascimento">
            </label>

            <button type="submit" id="btn-atualizar">Atualizar</button>
        </form>

        <div id="mensagem-atualizar" class="resultado" style="display: none; margin-top: 1.1rem;">
            <h3 id="atualizar-titulo"></h3>
            <p id="atualizar-corpo" class="texto-ajuda"></p>
        </div>
    </section>
</main>
</div>

<script src="atualizar.js"></script>

</body>
</html>
